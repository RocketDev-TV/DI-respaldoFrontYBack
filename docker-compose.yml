version: '3.8'

services:
  # --- BASE DE DATOS ---
  postgres_db:
    image: postgres:15-alpine
    container_name: project_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: tu_password_seguro
      POSTGRES_DB: project_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

# --- BACKEND (NestJS) ---
  backend:
    build:
      context: ./Back_Oficial
      dockerfile: Dockerfile
    env_file:
      - ./Back_Oficial/.env
    container_name: project_backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:tu_password_seguro@postgres_db:5432/project_db?schema=public&sslmode=disable
      - PORT=3001
    depends_on:
      - postgres_db

  # --- FRONTEND (React) ---
  frontend:
    build:
      context: ./Front_Oficial
      args:
      - REACT_APP_GRAPHQL_API_URL=https://anton-server.tailb29b29.ts.net/graphql
      dockerfile: Dockerfile # Necesitaremos crear uno rápido para el Front
    container_name: project_frontend
    restart: always
    ports:
      - "8080:80"
    environment:
      - REACT_APP_GRAPHQL_API_URL=https://anton-server.tailb29b29.ts.net/graphql
    depends_on:
      - backend

volumes:
  postgres_data:
